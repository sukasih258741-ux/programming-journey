<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan-1</title>
    <style>
        div {
            width: 200px;
            height: 100px;
            margin: 15px;
            padding: 10px;
        }

        .kotak1 {
            border: 5px solid black;
        }

        .kotak2 {
            border: 5px double blue;
        }

        .kotak3 {
            border: 5px groove green;
        }

        .kotak4 {
            border: 5px ridge red;
        }
    </style>
</head>
<body>
     <div class="kotak1">Border solid warna hitam</div>
    <div class="kotak2">Border double warna biru</div>
    <div class="kotak3">Border groove warna hijau</div>
    <div class="kotak4">Border ridge warna merah</div>
</body>
</html>
