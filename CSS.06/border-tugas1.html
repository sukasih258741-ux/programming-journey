<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik Border</title>
    <style>
         .solid {
            border: 3px solid blue;
            padding: 10px;
            background-color: #cde7ff; 
        }

        .dotted {
            border: 3px dotted red;
            padding: 10px;
            background-color: #ffd6e7; 
        }

        .double {
            border: 5px double green;
            padding: 10px;
            background-color: #d4f8d4; 
        }

        .dashed {
            border: 3px dashed purple;
            padding: 10px;
            background-color: #e6d6ff; 
        }

        .groove {
            border: 5px groove orange;
            padding: 10px;
            background-color: #ffe9cc; 
        }

        .ridge {
            border: 5px ridge brown;
            padding: 10px;
            background-color: #f5deb3; 
        }
    </style>
</head>
<body>
     <h2>Jenis-Jenis Border CSS</h2>

    <p class="solid">Ini border solid</p>
    <p class="dotted">Ini border dotted</p>
    <p class="double">Ini border double</p>
    <p class="dashed">Ini border dashed</p>
    <p class="groove">Ini border groove</p>
    <p class="ridge">Ini border ridge</p>

</body>
</html>
