<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan1</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color:lightpink;
            border: 2px solid black;
        }
        .box2 {
            width: 50%;
            height: 150px;
            background-color:lightpink;
            border: 2px solid black;
        }
        .box3 {
            width: 80vw;
            height: 30vh;
            background-color:lightpink;
            border: 2px solid black;
        }
    </style>

</head>
<body>
    <div class="box1">Box 200px x 200px</div>
    <div class="box2">Box 50% x 150px</div>
    <div class="box3">Box 80vw x 30vh</div>
</body>
</html>
