<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Position Relative</title>
    <style>
        .box {
            position: relative;
            left: 50px;
            top: 40px;
            background-color: lightblue;
            width: 150px;
            height: 150px;
        }
        .box1 {
            position: relative;
            left: 50;
            top: 40;
            background-color: lightblue;
            width: 100px;
            height: 100px;
        }

        .box2 {
            position: relative;
            left: 110px;
            top: 80;
            background-color: plum;
            width: 100px;
            height: 100px;
        }

        .box3 {
            position: relative;
            left: 215px;
            top: 12px;
            background-color: lightpink;
            width: 100px;
            height: 100px;
        }
        .box {
            position: relative;
            width: 100px;
            height: 100px;
        }

        .box1 {
            top: 40;
            left: 50;
            background-color: lightblue;
        }

        .box2 {
            top: 80;
            left: 100;
            background-color: plum;
        }

        .box3 {
            top: 120;
            left: 150;
            background-color: lightpink;
        }
    </style>
</head>
<body>
    <div class="box1">Relative Box</div>
    <div class="box2">Relative Box </div>
    <div class="box3">Relative Box</div>
</body>
</html>
