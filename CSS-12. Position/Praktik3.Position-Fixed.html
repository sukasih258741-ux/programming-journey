<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik 3 - Fixed</title>
    <style>
        .box1 {
            position: fixed;
            top: 0;
            left: 0;
            background-color: yellow;
            padding: 10px;
        }

        .backtop {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: black;
            color: white;
            padding: 10px;
            text-decoration: none;
        }

        .kiri {
            position: fixed;
            top: 50%;
            left: 0;
            background-color: lightblue;
            padding: 10px;
        }

        .kanan {
            position: fixed;
            top: 50%;
            right: 0;
            background-color: lightcoral;
            padding: 10px;
        }

    </style>
</head>
<body>
    <p></p>
        <div class="box1">Kiri Atas</div>

        <p></p>
        <a href="#" class="backtop">Back to Top</a>

        <p></p>
        <div class="kiri">Kiri</div>
        <div class="kanan">Kanan</div>

        <p style="height:1500px;">
    </p>

</body>
</html>
