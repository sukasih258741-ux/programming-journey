<!DOCTYPE html> 
<html> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praktik 3 - Fixed</title>
    <style> 
        .container { 
            position: relative; 
            width: 300px; 
            height: 300px; 
            background-color: lightgray; 
        } 

        .box { 
            position: absolute; 
            width: 80px; 
            height: 80px; 
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        } 

        .box1 { 
            top: 0; 
            left: 0; 
            background-color: coral; 
        } 

        .box2 { 
            top: 0; 
            right: 0; 
            background-color: teal; 
        } 

        .box3 { 
            bottom: 0; 
            left: 0; 
            background-color: purple; 
        } 

        .box4 { 
            bottom: 0; 
            right: 0; 
            background-color: orange; 
        } 

</style> 
</head> 

<body> 

    <div class="container"> 
        <div class="box box1">1</div> 
        <div class="box box2">2</div> 
        <div class="box box3">3</div> 
        <div class="box box4">4</div> 
    </div> 

</body> 
</html>
